<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pago Servicio</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
}

/* Espacio blanco superior */
.top-space {
  height: 100px;
  background: white;
}

/* Navbar */
.navbar {
  background: white;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.back-button {
  font-size: 16px;
  cursor: pointer;
  color: #1a73e8;
  font-weight: 600;
}

/* Card */
.card {
  background: white;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  max-width: 420px;
  margin: 30px auto;
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.amount {
  font-size: 36px;
  font-weight: 800;
  color: #1a73e8;
  margin-bottom: 30px;
}

.button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: #1a73e8;
  color: white;
}
</style>
</head>

<body>

<div class="top-space"></div>

<div class="navbar">
  <div class="back-button" onclick="goBack()">← Volver</div>
</div>

<div class="card">
  <div class="title">Pago de Servicio</div>
  <div class="amount">S/ 120.50</div>

  <button class="button primary" onclick="confirmPayment()">
    Confirmar con Face ID
  </button>
</div>

<script>

function goBack() {
  window.webkit.messageHandlers.bridge.postMessage({
    event: "goBack"
  });
}

function confirmPayment() {
  window.webkit.messageHandlers.bridge.postMessage({
    event: "requestBiometric",
    amount: 120.50
  });
}

</script>

</body>
</html>
