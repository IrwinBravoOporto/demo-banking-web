<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pago Servicio</title>

<style>

/* -------- OVERLAY -------- */

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* -------- MODAL -------- */

.modal {
  background: white;
  padding: 28px;
  border-radius: 16px;
  width: 85%;
  max-width: 340px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

.modal h2 {
  margin-bottom: 12px;
  font-size: 20px;
}

.modal p {
  margin-bottom: 24px;
  font-size: 16px;
  color: #555;
}

.modal button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  background: #1a73e8;
  color: white;
}

</style>
</head>

<body>

<div class="top-space"></div>

<div class="navbar">
  <div class="back-button" onclick="goBack()">← Volver</div>
</div>

<div class="card">
  <div class="title">Pago de Servicio</div>
  <div class="amount">S/ 120.50</div>

  <button class="button primary" onclick="confirmPayment()">
    Confirmar con Face ID
  </button>
</div>

<script>

let currentAmount = 120.50;

/* --------- ENVÍO AL NATIVO --------- */

function postToNative(payload) {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify(payload)
  );
}

/* --------- BOTONES --------- */

function goBack() {
  postToNative({ event: "goBack" });
}

function confirmPayment() {
  postToNative({
    event: "requestBiometric",
    amount: currentAmount
  });
}

/* --------- RESPUESTA BIOMÉTRICA DESDE iOS --------- */

function biometricResult(result) {

  if (result === "Autenticado") {
    showModal(
      "Pago exitoso",
      "Tu pago fue procesado correctamente.",
      "success"
    );
  } else {
    showModal(
      "Autenticación fallida",
      "No se pudo validar tu identidad.",
      "error"
    );
  }
}

/* --------- MODAL UI --------- */

function showModal(title, message, status) {

  const overlay = document.createElement("div");
  overlay.id = "overlay";

  overlay.innerHTML = `
    <div class="modal">
      <h2>${title}</h2>
      <p>${message}</p>
      <button onclick="confirmModal('${status}')">Aceptar</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

function confirmModal(status) {

  document.getElementById("overlay").remove();

  postToNative({
    event: "paymentCompleted",
    status: status,
    amount: currentAmount
  });
}

</script>

</body>
</html>
