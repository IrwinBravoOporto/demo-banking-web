<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pago Servicio</title>

<style>
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
}

/* NAVBAR WEB */
.navbar {
  background: white;
  padding: 16px;
  display: flex;
  align-items: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.back-button {
  font-size: 16px;
  cursor: pointer;
  color: #1a73e8;
  font-weight: 600;
}

.card {
  background: white;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  max-width: 420px;
  margin: 40px auto;
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.amount {
  font-size: 36px;
  font-weight: 800;
  color: #1a73e8;
  margin-bottom: 30px;
}

.button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: #1a73e8;
  color: white;
}

/* OVERLAY */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.hidden {
  display: none;
}

.modal {
  background: white;
  padding: 28px;
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
  text-align: center;
}

.icon {
  font-size: 48px;
  margin-bottom: 12px;
}
</style>
</head>

<body>

<div class="navbar">
  <div class="back-button" onclick="goBack()">← Volver</div>
</div>

<div class="card">
  <div class="title">Pago de Servicio</div>
  <div class="amount">S/ 120.50</div>

  <button class="button primary" onclick="confirmPayment()">
    Confirmar con Face ID
  </button>
</div>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <div id="modal-icon" class="icon"></div>
    <h2 id="modal-title"></h2>
    <p id="modal-message"></p>
    <button class="button primary" onclick="closeModal()">
      Aceptar
    </button>
  </div>
</div>

<script>

function goBack() {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({ event: "goBack" })
  );
}

function confirmPayment() {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({ event: "requestBiometric" })
  );
}

function biometricResult(result) {

  if (result === "Autenticado") {
    showSuccess();
  } else {
    showError();
  }
}

function showSuccess() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("modal-icon").innerHTML = "✔️";
  document.getElementById("modal-title").innerText = "Pago Exitoso";
  document.getElementById("modal-message").innerText =
    "La validación fue exitosa.";
}

function showError() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("modal-icon").innerHTML = "❌";
  document.getElementById("modal-title").innerText = "Pago Rechazado";
  document.getElementById("modal-message").innerText =
    "La validación falló.";
}

function closeModal() {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({ event: "closeScreen" })
  );
}

</script>

</body>
</html>
