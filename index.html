<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pago Servicio</title>

<style>

html, body {
  height: 100%;
  margin: 0;
  padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
}

/* Espacio blanco superior */
.top-space {
  height: 5px;
    background: red;
}

/* Navbar */
.navbar {
  background: white;
  padding: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.back-button {
  font-size: 16px;
  cursor: pointer;
  color: #1a73e8;
  font-weight: 600;
}

/* Card */
.card {
  background: white;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  max-width: 420px;
  margin: 30px auto;
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.amount {
  font-size: 36px;
  font-weight: 800;
  color: #1a73e8;
  margin-bottom: 30px;
}

.button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: #1a73e8;
  color: white;
}

/* ========================= */
/* ====== OVERLAY BANK ===== */
/* ========================= */

#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.45);
  backdrop-filter: blur(4px);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  animation: fadeIn 0.25s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Modal bancario */

.modal {
  background: white;
  padding: 28px;
  border-radius: 20px;
  width: 85%;
  max-width: 360px;
  text-align: center;
  box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  animation: scaleIn 0.25s ease;
}

@keyframes scaleIn {
  from { transform: scale(0.9); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

.modal-icon {
  font-size: 40px;
  margin-bottom: 16px;
}

.modal.success .modal-icon {
  color: #16a34a;
}

.modal.error .modal-icon {
  color: #dc2626;
}

.modal h2 {
  margin-bottom: 12px;
  font-size: 20px;
  font-weight: 700;
}

.modal p {
  margin-bottom: 24px;
  font-size: 15px;
  color: #555;
  line-height: 1.4;
}

.modal button {
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  font-weight: 600;
  background: #1a73e8;
  color: white;
}

</style>
</head>

<body>

<div class="top-space"></div>

<div class="navbar">
  <div class="back-button" onclick="goBack()">← Volver</div>
</div>

<div class="card">
  <div class="title">Pago de Servicio</div>
  <div class="amount">S/ 120.50</div>

  <button class="button primary" onclick="confirmPayment()">
    Confirmar con Face ID
  </button>
</div>

<script>

let currentAmount = 120.50;

function postToNative(payload) {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify(payload)
  );
}

function goBack() {
  postToNative({ event: "goBack" });
}

function confirmPayment() {
  postToNative({
    event: "requestBiometric",
    amount: currentAmount
  });
}

/* ---- iOS RESPONSE ---- */

function biometricResult(result) {

  if (result === "Autenticado") {
    showModal(
      "success",
      "Pago exitoso",
      "Tu pago fue procesado correctamente."
    );
  } else {
    showModal(
      "error",
      "Autenticación fallida",
      "No se pudo validar tu identidad."
    );
  }
}

/* ---- MODAL ---- */

function showModal(type, title, message) {

  const overlay = document.createElement("div");
  overlay.id = "overlay";

  overlay.innerHTML = `
    <div class="modal ${type}">
      <div class="modal-icon">
        ${type === "success" ? "✔︎" : "✖︎"}
      </div>
      <h2>${title}</h2>
      <p>${message}</p>
      <button onclick="confirmModal('${type}')">Aceptar</button>
    </div>
  `;

  document.body.appendChild(overlay);
}

function confirmModal(type) {

  document.getElementById("overlay").remove();

  postToNative({
    event: "paymentCompleted",
    status: type === "success" ? "success" : "error",
    amount: currentAmount
  });
}

</script>

</body>
</html>
