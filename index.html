<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pago Servicio</title>

<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #f4f6f9;
  padding: 20px;
  margin: 0;
}

/* CARD */
.card {
  background: white;
  padding: 28px;
  border-radius: 16px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.08);
  max-width: 420px;
  margin: 40px auto;
}

.title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 20px;
}

.label {
  font-size: 16px;
  margin-bottom: 8px;
  color: #555;
}

.amount {
  font-size: 36px;
  font-weight: 800;
  color: #1a73e8;
  margin-bottom: 30px;
}

.button {
  width: 100%;
  padding: 16px;
  border-radius: 12px;
  border: none;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
}

.primary {
  background: #1a73e8;
  color: white;
}

/* OVERLAY FULLSCREEN */
.overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0, 0, 0, 0.65);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.hidden {
  display: none;
}

.modal {
  background: white;
  padding: 28px;
  border-radius: 20px;
  width: 85%;
  max-width: 400px;
  text-align: center;
  animation: fadeIn 0.25s ease-in-out;
}

.icon {
  font-size: 48px;
  margin-bottom: 12px;
}

.success-icon {
  color: #0a8f3e;
}

.error-icon {
  color: #d93025;
}

.processing-icon {
  color: #f9a825;
}

@keyframes fadeIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
</style>
</head>

<body>

<div class="card">
  <div class="title">Pago de Servicio</div>

  <div class="label">Empresa</div>
  <div style="font-size:18px; margin-bottom:20px;">Luz del Sur</div>

  <div class="amount">S/ 120.50</div>

  <button class="button primary" onclick="confirmPayment()">
    Confirmar con Face ID
  </button>
</div>

<!-- OVERLAY MODAL -->
<div id="overlay" class="overlay hidden">
  <div class="modal">
    <div id="modal-icon" class="icon"></div>
    <h2 id="modal-title"></h2>
    <p id="modal-message"></p>
    <button class="button primary" onclick="closeModal()">
      Aceptar
    </button>
  </div>
</div>

<script>

function confirmPayment() {
  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({
      event: "requestBiometric"
    })
  );
}

function biometricResult(result) {

  if (result === "Autenticado") {

    showProcessing();

    setTimeout(() => {
      showSuccess();
    }, 1500);

  } else {
    showError();
  }
}

function showProcessing() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("modal-icon").innerHTML = "⏳";
  document.getElementById("modal-icon").className = "icon processing-icon";
  document.getElementById("modal-title").innerText = "Procesando";
  document.getElementById("modal-message").innerText = "Estamos procesando su pago...";
}

function showSuccess() {
  document.getElementById("modal-icon").innerHTML = "✔️";
  document.getElementById("modal-icon").className = "icon success-icon";
  document.getElementById("modal-title").innerText = "Pago Exitoso";
  document.getElementById("modal-message").innerText =
    "La validación fue exitosa. Su servicio fue pagado correctamente.";

  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({
      event: "paymentCompleted",
      status: "success",
      amount: 120.50
    })
  );
}

function showError() {
  document.getElementById("overlay").classList.remove("hidden");
  document.getElementById("modal-icon").innerHTML = "❌";
  document.getElementById("modal-icon").className = "icon error-icon";
  document.getElementById("modal-title").innerText = "Pago Rechazado";
  document.getElementById("modal-message").innerText =
    "La validación falló. Intente nuevamente.";

  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({
      event: "paymentCompleted",
      status: "error",
      amount: 120.50
    })
  );
}

function closeModal() {
  document.getElementById("overlay").classList.add("hidden");

  window.webkit.messageHandlers.bridge.postMessage(
    JSON.stringify({
      event: "modalClosed"
    })
  );
}

</script>

</body>
</html>
